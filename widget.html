<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Widget Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #hb-chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99999;
      font-family: Arial, sans-serif;
    }

    #hb-chat-toggle {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
    }

    #hb-chat-window {
      width: 340px;
      height: 460px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      margin-top: 10px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    #hb-chat-header {
      background: #111;
      color: #fff;
      padding: 14px;
      font-weight: bold;
      font-size: 15px;
    }

    #hb-chat-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #f7f7f7;
    }

    .hb-msg {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 85%;
      line-height: 1.4;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .hb-user {
      background: #111;
      color: #fff;
      margin-left: auto;
    }

    .hb-bot {
      background: #e9e9e9;
      color: #111;
      margin-right: auto;
    }

    #hb-chat-input-row {
      display: flex;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    #hb-chat-input {
      flex: 1;
      border: none;
      padding: 12px;
      outline: none;
      font-size: 14px;
    }

    #hb-chat-send {
      border: none;
      background: #111;
      color: white;
      padding: 0 16px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="hb-chatbot">
    <button id="hb-chat-toggle">Chat</button>

    <div id="hb-chat-window">
      <div id="hb-chat-header">Hoverboard Store UK</div>
      <div id="hb-chat-messages"></div>

      <div id="hb-chat-input-row">
        <input id="hb-chat-input" type="text" placeholder="Ask a question..." />
        <button id="hb-chat-send">Send</button>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('hb-chat-toggle');
    const chatWindow = document.getElementById('hb-chat-window');
    const sendBtn = document.getElementById('hb-chat-send');
    const input = document.getElementById('hb-chat-input');
    const messages = document.getElementById('hb-chat-messages');

    const API_URL = 'https://shopify-chatbot-api-6kfs.onrender.com/chat';
    /* 🔥 ADD THIS HERE */
const SESSION_KEY = 'hb_chat_session_id';

let sessionId = localStorage.getItem(SESSION_KEY);
if (!sessionId) {
  sessionId = 'sess_' + Math.random().toString(36).slice(2) + Date.now();
  localStorage.setItem(SESSION_KEY, sessionId);
}
    toggleBtn.addEventListener('click', () => {
      chatWindow.style.display =
        chatWindow.style.display === 'none' || chatWindow.style.display === ''
          ? 'flex'
          : 'none';
    });

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `hb-msg ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'hb-user');
      input.value = '';
      addMessage('Typing...', 'hb-bot');

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ 
            message: message,
            sessionId: sessionId
          }),
        });

        const data = await res.json();
        messages.lastChild.remove();
        addMessage(data.answer || 'Sorry, something went wrong.', 'hb-bot');
      } catch (err) {
        messages.lastChild.remove();
        addMessage('Sorry, the chat service is unavailable right now.', 'hb-bot');
        console.error(err);
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
